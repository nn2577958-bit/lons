<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LONS Palworld Home</title>

<link rel="icon" href="https://cdn.phototourl.com/uploads/2026-02-16-2fc87bae-3744-4c0a-891f-19f3a20b09fd.png">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">

<style>
* {box-sizing:border-box;margin:0;padding:0}
body {
  min-height:100vh;
  font-family:'Orbitron','Exo 2',sans-serif;
  background: 
    radial-gradient(ellipse at top, #0f2027 0%, transparent 50%),
    radial-gradient(ellipse at bottom, #203a43 0%, transparent 50%),
    linear-gradient(135deg, #0f0f23, #1a1a2e, #16213e);
  color:#fff;
  overflow-x:hidden;
  position:relative;
}
body::before {
  content:'';position:fixed;top:0;left:0;right:0;bottom:0;
  background-image: 
    radial-gradient(circle at 20% 80%, rgba(120,119,198,0.3) 0%, transparent 50%),
    radial-gradient(circle at 80% 20%, rgba(255,119,198,0.3) 0%, transparent 50%),
    radial-gradient(circle at 40% 40%, rgba(120,219,255,0.2) 0%, transparent 50%);
  animation:nebula 20s ease-in-out infinite;
  z-index:-2;
}
@keyframes nebula {
  0%,100%{transform:scale(1) rotate(0deg)}
  50%{transform:scale(1.1) rotate(180deg)}
}
.container {
  max-width:1000px;margin:0 auto;padding:40px 20px;position:relative;z-index:1;
}
.header {
  text-align:center;margin-bottom:50px;padding:30px 0;
  background:linear-gradient(135deg, rgba(255,255,255,0.1), rgba(255,255,255,0.05));
  backdrop-filter:blur(20px);border-radius:24px;border:1px solid rgba(255,255,255,0.1);
  box-shadow:0 20px 40px rgba(0,0,0,0.4);
}
h1 {
  font-size:clamp(28px,5vw,42px);font-weight:900;
  background:linear-gradient(135deg, #00d4ff, #ffffff, #ff6b9d);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  text-shadow:0 0 30px rgba(0,212,255,0.5);letter-spacing:-1px;
  margin:0;position:relative;
}
h1::after {
  content:'';position:absolute;bottom:-10px;left:50%;transform:translateX(-50%);
  width:80px;height:4px;background:linear-gradient(90deg,transparent,#00d4ff,#ff6b9d,transparent);
  border-radius:2px;
}

/* 🚀 3D 네온 카드 */
.embed-card {
  background:linear-gradient(145deg, rgba(43,45,49,0.9), rgba(20,20,25,0.9));
  backdrop-filter:blur(15px);border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;padding:25px;margin-bottom:25px;
  box-shadow: 
    0 20px 40px rgba(0,0,0,0.4),
    inset 0 1px 0 rgba(255,255,255,0.1);
  transition:all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
  position:relative;overflow:hidden;
}
.embed-card::before {
  content:'';position:absolute;top:0;left:0;right:0;height:4px;
  background:linear-gradient(90deg, #5865F2, #ED4245, #57F287, #FEE75C, #5865F2);
  background-size:200% 100%;animation:gradientFlow 3s linear infinite;
}
@keyframes gradientFlow {
  0%{background-position:100% 0}
  100%{background-position:0 0}
}
.embed-card:hover {
  transform:translateY(-12px) rotateX(5deg) rotateY(5deg);
  box-shadow:0 35px 60px rgba(0,0,0,0.6), 0 0 40px rgba(0,212,255,0.3);
}
.embed-title {
  font-size:20px;font-weight:900;color:#fff;margin-bottom:12px;
  display:flex;align-items:center;gap:10px;
}
.embed-desc {
  font-size:15px;line-height:1.7;color:rgba(255,255,255,0.85);
  margin-bottom:15px;
}
.embed-footer {
  display:flex;justify-content:space-between;align-items:center;
  font-size:13px;color:rgba(255,255,255,0.6);padding-top:12px;
  border-top:1px solid rgba(255,255,255,0.1);
}

/* 🎮 하단 버튼 그룹 */
.button-group {
  display:flex;justify-content:center;gap:20px;margin-top:60px;
  perspective:1000px;
}
.main-btn {
  padding:16px 30px;font-size:16px;font-weight:700;border-radius:16px;
  color:#fff;cursor:pointer;display:flex;align-items:center;gap:12px;
  transition:all 0.3s cubic-bezier(0.25,0.46,0.45,0.94);border:none;
  font-family:'Orbitron',sans-serif;letter-spacing:0.5px;
  position:relative;overflow:hidden;transform-style:preserve-3d;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}
.main-btn::before {
  content:'';position:absolute;top:0;left:-100%;width:100%;height:100%;
  background:linear-gradient(90deg,transparent,rgba(255,255,255,0.4),transparent);
  transition:left 0.6s;
}
.main-btn:hover::before {left:100%}
.main-btn:hover {transform:translateY(-6px) translateZ(20px);}

.logout-btn {
  background:linear-gradient(135deg, #ED4245, #DC2F2F);
}
.logout-btn:hover {
  box-shadow:0 15px 40px rgba(237,66,69,0.6);
  background:linear-gradient(135deg, #DC2F2F, #B32929);
}

.discord-btn {
  background:linear-gradient(135deg, #5865F2, #4752C4);
  box-shadow:0 10px 30px rgba(88,101,242,0.4);
}
.discord-btn:hover {
  box-shadow:0 20px 50px rgba(88,101,242,0.7);
  background:linear-gradient(135deg, #4752C4, #394CAB);
}

@media(max-width:768px){
  .container{padding:20px}
  .button-group{flex-direction:column;align-items:center;gap:15px}
  .embed-card{padding:20px}
}
@media(max-width:480px){
  .header{padding:20px}
  h1{font-size:24px}
  .embed-title{font-size:18px}
}
</style>
</head>

<body>
<div class="container">
  <div class="header">
    <h1>🚀 LONS 서버 공지사항</h1>
  </div>

  <div class="embed-card" style="--card-color:#5865F2">
    <div class="embed-title">📢 서버 오픈 안내</div>
    <div class="embed-desc">
      LONS Palworld 서버가 <strong>정식 오픈</strong>되었습니다.<br>
      많은 참여 부탁드립니다! 🎮
    </div>
    <div class="embed-footer">
      <span>👑 관리자</span>
      <span>2026-01-12</span>
    </div>
  </div>

  <div class="embed-card" style="--card-color:#ED4245">
    <div class="embed-title">⚠ 서버 규칙 필독</div>
    <div class="embed-desc">
      • <strong>비매너 행위 금지</strong><br>
      • 버그 악용 시 <strong>영구 정지</strong><br>
      • 관리자 지시 불이행 시 <strong>제재</strong>
    </div>
    <div class="embed-footer">
      <span>⚖ 운영팀</span>
      <span>공지사항</span>
    </div>
  </div>

  <div class="embed-card" style="--card-color:#57F287">
    <div class="embed-title">❤ 활성화 3월 이벤트</div>
    <div class="embed-desc">
      • <strong>02-26 ~ 03-08</strong> 홍보 활성화 이벤트<br>
      • 많은 참여 부탁 드리겠습니다!<br>
      • 자세한 사항은 <strong>디스코드 게시판</strong> 확인!
    </div>
    <div class="embed-footer">
      <span>🎉 운영팀</span>
      <span>활성화 이벤트</span>
    </div>
  </div>

  <div class="button-group">
    <a href="https://discord.com/invite/tnMXbQ65Hk" target="_blank" class="main-btn discord-btn">
      <i class="fab fa-discord"></i> 디스코드 참여
    </a>
    <button class="main-btn logout-btn" id="logoutBtn">
      <i class="fa-solid fa-right-from-bracket"></i> 로그아웃
    </button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-app.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/9.23.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyCyiAepd539cBTPwtcVnAR-HJbb8roLJmE",
  authDomain: "lons.rani-mall.xyz",   // ← 이걸로 통일
  projectId: "lons-dc24d",
  storageBucket: "lons-dc24d.appspot.com",
  messagingSenderId: "755692328918",
  appId: "1:755692328918:web:a4eb4563cb862d3eb5b677"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// 로그인 체크
onAuthStateChanged(auth, user => {
  if (!user) window.location.href = "index.html";
});

// 로그아웃
document.getElementById("logoutBtn").addEventListener("click", async ()=>{
  await signOut(auth);
  window.location.href = "index.html";
});
</script>
</body>
</html>
